[package]
name = "magba"
version = "0.2.0"
authors = ["Sira Pornsiriprasert <code@psira.me>"]

description = "Magnetic computation library for Rust"
categories = ["science", "simulation"]
keywords = ["magnet", "magnetic", "field", "analytical", "simulation"]
documentation = "https://docs.rs/magba"
homepage = "https://github.com/p-sira/magba"
repository = "https://github.com/p-sira/magba"
readme = "README.md"
license = "BSD-3-Clause"
edition = "2021"
exclude = ["benches", "logo", "magba.code-workspace", "python", "tests/test-data", "requirements*", ".github", ".gitignore"]

[dependencies]
ellip = "0.3.2"
getset = "0.1.6"
itertools = "0.14.0"
nalgebra = { version = "0.33.2" }
num-traits = "0.2.19"
numeric_literals = "0.2.0"
rayon = { version = "1.10.0", optional = true }

[dev-dependencies]
criterion = "0.5.1"
csv = "1.3.1"
nalgebra = { version = "0.33.2" }
rayon = "1.10.0"

[features]
default = ["sources", "parallel"]
transform = []
sources = ["transform"]
parallel = ["dep:rayon", "nalgebra/rayon"]
unstable = []

[[bench]]
name = "bench"
harness = false
